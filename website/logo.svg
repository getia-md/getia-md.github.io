<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 32" fill="none">
  <!--
    getIA.md full logo
    Left: sitemap icon (three stacked pages + tree connector)
    Right: "getIA.md" wordmark
  -->

  <!-- === Icon portion (same as favicon) === -->

  <!-- Vertical connector line (navigation tree trunk) -->
  <rect x="2" y="5" width="2" height="22" rx="1" fill="#60a5fa"/>

  <!-- Horizontal branch lines -->
  <rect x="2" y="6"  width="6" height="2" rx="1" fill="#60a5fa"/>
  <rect x="2" y="14" width="6" height="2" rx="1" fill="#60a5fa"/>
  <rect x="2" y="22" width="6" height="2" rx="1" fill="#60a5fa"/>

  <!-- Page rectangle 1 (top) -->
  <rect x="10" y="3" width="14" height="8" rx="2" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <rect x="13" y="5.5" width="8" height="1.2" rx="0.6" fill="#60a5fa" opacity="0.5"/>
  <rect x="13" y="8"   width="5" height="1.2" rx="0.6" fill="#60a5fa" opacity="0.3"/>

  <!-- Page rectangle 2 (middle) -->
  <rect x="10" y="12.5" width="14" height="8" rx="2" stroke="#60a5fa" stroke-width="1.5" fill="rgba(96,165,250,0.08)"/>
  <rect x="13" y="15"   width="8" height="1.2" rx="0.6" fill="#60a5fa" opacity="0.5"/>
  <rect x="13" y="17.5" width="6" height="1.2" rx="0.6" fill="#60a5fa" opacity="0.3"/>

  <!-- Page rectangle 3 (bottom) -->
  <rect x="10" y="22" width="14" height="8" rx="2" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <rect x="13" y="24.5" width="7" height="1.2" rx="0.6" fill="#60a5fa" opacity="0.5"/>
  <rect x="13" y="27"   width="4" height="1.2" rx="0.6" fill="#60a5fa" opacity="0.3"/>

  <!-- === Wordmark: "getIA.md" === -->
  <text x="34" y="21.5"
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
        font-size="15"
        font-weight="700"
        letter-spacing="-0.3"
        fill="#ededed">get<tspan fill="#60a5fa">IA</tspan>.md</text>
</svg>
